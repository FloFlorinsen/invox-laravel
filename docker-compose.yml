services:
    mysql:
        image: mysql:8.4
        ports:
            - '3306:3306'
        environment:
            MYSQL_ROOT_PASSWORD: '${DB_PASSWORD:-secret}'
            MYSQL_DATABASE: '${DB_DATABASE:-invox}'
            MYSQL_USER: '${DB_USERNAME:-invox}'
            MYSQL_PASSWORD: '${DB_PASSWORD:-secret}'
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: ['CMD', 'mysqladmin', 'ping', '-p${DB_PASSWORD:-secret}']
            retries: 3
            timeout: 5s

volumes:
    mysql-data:
