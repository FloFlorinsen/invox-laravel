name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: bun install

      - name: Build assets
        run: bun run build

      - name: Create .env
        run: |
          printf '%s\n' \
            'APP_NAME=invox' \
            'APP_ENV=production' \
            'APP_KEY=${{ secrets.APP_KEY }}' \
            'APP_DEBUG=false' \
            'APP_URL="${{ secrets.APP_URL }}"' \
            'DB_HOST=${{ secrets.DB_HOST }}' \
            'DB_PORT=3306' \
            'DB_DATABASE=${{ secrets.DB_DATABASE }}' \
            'DB_USERNAME=${{ secrets.DB_USERNAME }}' \
            'DB_PASSWORD="${{ secrets.DB_PASSWORD }}"' \
            'SESSION_DRIVER=database' \
            'QUEUE_CONNECTION=database' \
            'CACHE_STORE=database' \
            'FILESYSTEM_DISK=local' \
            'OWNER_NAME="${{ secrets.OWNER_NAME }}"' \
            'OWNER_EMAIL=${{ secrets.OWNER_EMAIL }}' \
            'OWNER_PASSWORD="${{ secrets.OWNER_PASSWORD }}"' \
            > .env

      - name: Create deploy archive
        run: |
          zip -rq /tmp/deploy.zip . \
            -x ".git/*" \
            -x "node_modules/*" \
            -x "tests/*" \
            -x "storage/logs/*" \
            -x "storage/framework/cache/*" \
            -x "storage/framework/sessions/*" \
            -x "storage/framework/views/*"

      - name: Upload archive via SFTP
        run: |
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" \
            sftp -oBatchMode=no -oStrictHostKeyChecking=no -P ${{ secrets.SFTP_PORT }} \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }} <<SFTP
          put /tmp/deploy.zip ${{ secrets.SFTP_REMOTE_DIR }}/deploy.zip
          SFTP

      - name: Extract and clean up on server
        run: |
          sshpass -p "${{ secrets.SFTP_PASSWORD }}" \
            ssh -oStrictHostKeyChecking=no -p ${{ secrets.SFTP_PORT }} \
            ${{ secrets.SFTP_USERNAME }}@${{ secrets.SFTP_HOST }} \
            "cd ${{ secrets.SFTP_REMOTE_DIR }} && unzip -oq deploy.zip && rm deploy.zip && mkdir -p storage/framework/{cache,sessions,views} storage/logs storage/app/private && php artisan migrate --force && php artisan config:cache && php artisan route:cache && php artisan view:cache"
