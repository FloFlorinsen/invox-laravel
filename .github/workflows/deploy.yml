name: deploy

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '22'

      - name: Install Composer dependencies
        run: composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader

      - name: Install Node dependencies
        run: npm i

      - name: Build assets
        run: npm run build

      - name: Create .env
        run: |
          cat <<EOF > .env
          APP_NAME=invox
          APP_ENV=production
          APP_KEY=${{ secrets.APP_KEY }}
          APP_DEBUG=false
          APP_URL=${{ secrets.APP_URL }}
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=3306
          DB_DATABASE=${{ secrets.DB_DATABASE }}
          DB_USERNAME=${{ secrets.DB_USERNAME }}
          DB_PASSWORD=${{ secrets.DB_PASSWORD }}
          SESSION_DRIVER=database
          QUEUE_CONNECTION=database
          CACHE_STORE=database
          FILESYSTEM_DISK=local
          OWNER_NAME=${{ secrets.OWNER_NAME }}
          OWNER_EMAIL=${{ secrets.OWNER_EMAIL }}
          OWNER_PASSWORD=${{ secrets.OWNER_PASSWORD }}
          EOF

      - name: Deploy via SFTP
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.SFTP_HOST }}
          port: ${{ secrets.SFTP_PORT }}
          username: ${{ secrets.SFTP_USERNAME }}
          password: ${{ secrets.SFTP_PASSWORD }}
          local_path: './*'
          remote_path: ${{ secrets.SFTP_REMOTE_DIR }}
          sftpArgs: '-o ConnectTimeout=30'
          exclude: '.git/,node_modules/,tests/,storage/logs/,storage/framework/cache/,storage/framework/sessions/,storage/framework/views/,storage/app/'
